name: "Phase 2: Build + Deploy"

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REMOTE_BACKEND: "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.BACKEND_PATH }}"
      REMOTE_FRONTEND: "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.FRONTEND_PATH }}"

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      # ── BACKEND VALIDATION ──
      - name: "Backend: Install Dependencies"
        run: cd backend && npm ci
      - name: "Backend: Build (Placeholder)"
        run: cd backend && npm run build
      - name: "Backend: Test (Placeholder)"
        run: cd backend && npm test

      # ── FRONTEND BUILD ──
      - name: "Frontend: Install Dependencies"
        run: cd frontend && npm ci
      - name: "Frontend: Build Production Artifact"
        run: cd frontend && npm run build

      # ── DEPLOYMENT ──
      - name: "Setup SSH Key"
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: "Deploy Frontend to Web Root"
        run: |
          echo "📦 Syncing frontend/dist/ to $REMOTE_FRONTEND"
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./frontend/dist/ \
            "$REMOTE_FRONTEND/"

      - name: "Deploy Backend Source Code"
        run: |
          echo "📦 Syncing backend/ to $REMOTE_BACKEND"
          
          # 1. Ensure remote target directory exists (prevents mkdir error)
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ secrets.BACKEND_PATH }}"
          
          # 2. Sync files
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" \
            --exclude='node_modules/' \
            --exclude='.git/' \
            --exclude='tmp/' \
            --exclude='logs/' \
            --exclude='.env' \
            ./backend/ \
            "$REMOTE_BACKEND/"

      - name: "Install Backend Dependencies & Restart (Option B)"
        run: |
          echo "🔧 Installing production dependencies via direct nodevenv path..."
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.BACKEND_PATH }} && \
            mkdir -p tmp && \
            /home/hikeamoa/nodevenv/checkout.hike-summit.com/Wassil-HikeSummit/backend/22/bin/npm ci --production
          "

          echo "🔄 Triggering Passenger restart..."
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            touch ${{ secrets.BACKEND_PATH }}/tmp/restart.txt
          "

      - name: "Verify Deployment (Health Checks)"
        run: |
          echo "🩺 Checking Frontend..."
          curl -f --max-time 15 https://checkout.hike-summit.com/ > /dev/null 2>&1 || echo "⚠️ Frontend returned non-200"
          echo "🩺 Checking Backend..."
          curl -f --max-time 15 https://api.hike-summit.com/ > /dev/null 2>&1 || echo "⚠️ Backend returned non-200"
          echo "✅ Deployment Pipeline Complete!"