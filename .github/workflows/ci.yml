name: Phase 1: CI Validation (Backend + Frontend)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Match Namecheap's CloudLinux Node version (from your path: .../backend/22/)
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────────────────────
  # BACKEND VALIDATION
  # ─────────────────────────────────────────────────────────────
  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies (Deterministic)
        run: npm ci

      - name: Lint (Fastest feedback)
        run: npm run lint

      - name: Type Check (Optional - skip if not using TS)
        run: npm run type-check || true

      - name: Run Tests
        run: npm test
        # Tip: If no tests yet, use: run: echo "No tests yet" || true

      - name: Verify Build Script Exists (Prep for Phase 2)
        run: |
          if ! grep -q '"build"' package.json; then
            echo "::warning::No 'build' script in backend/package.json. Add one if you use TypeScript/Babel."
          fi

  # ─────────────────────────────────────────────────────────────
  # FRONTEND VALIDATION + BUILD
  # ─────────────────────────────────────────────────────────────
  validate-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check || true

      - name: Run Tests
        run: npm test

      - name: Build Production Artifact
        run: npm run build
        # Output: frontend/dist/ with index.html, assets/, etc.

      - name: Upload Build Artifact (For Phase 2 CD)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1
          if-no-files-found: error